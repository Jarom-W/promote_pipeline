apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: http-service
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/jarom-w/sample_http
    targetRevision: main
    path: charts/http_service

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
