apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: http-service-dev
  namespace: argocd
spec:
  project: default

  sources:

    - repoURL: https://github.com/jarom-w/promote_pipeline
      targetRevision: main
      ref: values
      helm:
        valueFiles:
          - $values/environments/http_service/dev/dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

